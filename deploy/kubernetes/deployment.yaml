apiVersion: apps/v1
kind: Deployment
metadata:
  name: synara-control-plane
  labels:
    app.kubernetes.io/name: synara-control-plane
    app.kubernetes.io/part-of: synara
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: synara-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synara-control-plane
        app.kubernetes.io/part-of: synara
    spec:
      serviceAccountName: synara-control-plane
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: synara-control-plane:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3780
          env:
            - name: SYNARA_DEPLOYMENT_PROFILE
              value: enterprise
            - name: SYNARA_METADATA_STORE
              value: postgresql
            - name: SYNARA_ARTIFACT_STORE
              value: s3
            - name: SYNARA_QUEUE_DRIVER
              value: postgres-outbox
            - name: SYNARA_CONTROL_PLANE_REPLICAS
              value: "2"
            - name: SYNARA_CONTROL_PLANE_LISTEN
              value: 0.0.0.0:3780
            - name: SYNARA_PUBLIC_CONTROL_PLANE_URL
              valueFrom:
                configMapKeyRef:
                  name: synara-control-plane-config
                  key: public-control-plane-url
            - name: SYNARA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: synara-control-plane-secrets
                  key: database-url
            - name: SYNARA_WORKER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: synara-control-plane-secrets
                  key: worker-registration-token
            - name: SYNARA_PROVIDER_CURSOR_KEY
              valueFrom:
                secretKeyRef:
                  name: synara-control-plane-secrets
                  key: provider-cursor-key
            - name: SYNARA_CREDENTIAL_KMS_PROVIDER
              value: aws-kms
            - name: SYNARA_CREDENTIAL_KMS_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: synara-control-plane-config
                  key: credential-kms-key-id
            - name: SYNARA_CREDENTIAL_KMS_AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: synara-control-plane-config
                  key: aws-region
            - name: SYNARA_ARTIFACT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: synara-control-plane-config
                  key: artifact-bucket
            - name: SYNARA_ARTIFACT_REGION
              valueFrom:
                configMapKeyRef:
                  name: synara-control-plane-config
                  key: aws-region
            - name: SYNARA_KUBERNETES_RECONCILE_INTERVAL
              value: 5s
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
