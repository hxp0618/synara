apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: synara-control-plane-reconciler
  labels:
    app.kubernetes.io/name: synara-control-plane
    app.kubernetes.io/part-of: synara
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "secrets", "serviceaccounts", "resourcequotas"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: synara-control-plane-reconciler
  labels:
    app.kubernetes.io/name: synara-control-plane
    app.kubernetes.io/part-of: synara
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: synara-control-plane-reconciler
subjects:
  - kind: ServiceAccount
    name: synara-control-plane
    namespace: synara-system
