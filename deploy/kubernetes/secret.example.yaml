apiVersion: v1
kind: Secret
metadata:
  name: synara-control-plane-secrets
  namespace: synara-system
type: Opaque
stringData:
  database-url: postgresql://replace-me
  worker-registration-token: replace-me
  # Base64 text representing a random 32-byte key; the value itself remains a
  # string here because the application decodes it after reading the env var.
  provider-cursor-key: replace-me
