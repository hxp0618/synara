apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../namespaced
  - ../cluster
replacements:
  - source:
      kind: ConfigMap
      name: synara-worker-signing-settings
      fieldPath: data.repositoryPattern
    targets:
      - select:
          group: kyverno.io
          version: v1
          kind: ClusterPolicy
          name: verify-synara-worker-images
        fieldPaths:
          - spec.rules.0.verifyImages.0.imageReferences.0
