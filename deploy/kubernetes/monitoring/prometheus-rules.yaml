apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: synara-control-plane
  namespace: synara-system
  labels:
    app.kubernetes.io/name: synara-control-plane
    app.kubernetes.io/part-of: synara
spec:
  groups:
    - name: synara-control-plane.availability
      rules:
        - alert: SynaraControlPlaneUnavailable
          expr: sum(up{service="synara-control-plane"}) == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Synara control plane is unavailable
            description: Prometheus has not scraped a healthy Synara control-plane replica for two minutes.
        - alert: SynaraControlPlaneHighErrorRate
          expr: |
            sum(rate(synara_http_requests_total{status=~"5.."}[5m]))
              /
            clamp_min(sum(rate(synara_http_requests_total[5m])), 0.001) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Synara control-plane error rate is above 5 percent
            description: Server-side HTTP failures have exceeded 5 percent for ten minutes.
        - alert: SynaraControlPlaneHighLatency
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (rate(synara_http_request_duration_seconds_bucket[5m]))
            ) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Synara control-plane p95 latency is above two seconds
            description: Control-plane request latency has remained elevated for ten minutes.
        - alert: SynaraDatabaseConnectionSaturation
          expr: |
            sum(synara_database_connections{state="in_use"})
              /
            clamp_min(sum(synara_database_connections{state="max_open"}), 1) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Synara database connection pools are saturated
            description: More than 90 percent of configured database connections have been in use for five minutes.
    - name: synara-control-plane.runtime
      rules:
        - alert: SynaraBackgroundFailures
          expr: increase(synara_background_failures_total[10m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: Synara background reconciliation is failing
            description: A Docker, Kubernetes, or retention background run failed in the last ten minutes.
        - alert: SynaraExpiredWorkerLeases
          expr: synara_worker_leases{state="expired"} > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Synara has expired Worker leases awaiting recovery
            description: One or more expired Worker leases remain in authoritative metadata.
        - alert: SynaraOutboxBacklog
          expr: synara_outbox_pending > 1000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Synara outbox backlog is growing
            description: More than 1000 unpublished outbox messages have remained pending for ten minutes.
        - alert: SynaraOutboxOldestAge
          expr: synara_outbox_oldest_pending_seconds > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Synara outbox delivery is delayed
            description: The oldest pending outbox message has been waiting for more than five minutes.
        - alert: SynaraOutboxDeadLetters
          expr: synara_outbox_dead_letter > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Synara outbox has dead-letter messages
            description: One or more lifecycle messages exhausted all publish attempts and require operator review.
        - alert: SynaraArtifactFailureRate
          expr: |
            sum(rate(synara_artifact_operations_total{result="failure"}[5m]))
              /
            clamp_min(sum(rate(synara_artifact_operations_total[5m])), 0.001) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Synara Artifact operations are failing
            description: More than five percent of Artifact lifecycle operations have failed for ten minutes.
        - alert: SynaraSSECatchupDelay
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (rate(synara_sse_catchup_duration_seconds_bucket[5m]))
            ) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Synara SSE catch-up is delayed
            description: PostgreSQL-backed SSE catch-up p95 latency has exceeded five seconds for five minutes.
        - alert: SynaraExpiredSSELeases
          expr: synara_sse_connections{state="expired"} > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Synara has expired SSE connection leases
            description: Expired SSE leases remain and should be removed by reconnect or retention cleanup.
