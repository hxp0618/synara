apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: synara-control-plane
  namespace: synara-system
  labels:
    app.kubernetes.io/name: synara-control-plane
    app.kubernetes.io/part-of: synara
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: synara-control-plane
  namespaceSelector:
    matchNames: [synara-system]
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 5s
